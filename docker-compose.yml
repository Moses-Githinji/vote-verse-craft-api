version: '3.8'
services:
  api:
    build: .
    ports:
      - "4000:4000"
    environment:
      - MONGODB_URI=mongodb://user:password@db:27017/shulepal
      - JWT_SECRET=test_dev_secret_key_123
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: mongo:6
    environment:
      - MONGO_INITDB_ROOT_USERNAME=user
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=shulepal
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
